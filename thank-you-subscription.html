<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — C.A.S.E. Clarity Subscription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #9a7e1e;
    --gold-light: #b09837;
    --navy: #1e2a4a;
    --page-bg: #f8f9fb;
    --text: #1a1a1a;
    --text-muted: #4a5568;
    --green: #1a7a4a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--page-bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    background: var(--navy);
    border-bottom: 1px solid rgba(154,126,30,0.3);
    padding: 12px 24px;
  }
  .topbar-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  .topbar-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 64px;
  }
  .card {
    max-width: 520px;
    width: 100%;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(30,42,74,0.08);
    border: 1px solid rgba(30,42,74,0.08);
    padding: 40px 36px;
    text-align: center;
  }
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 4vw, 34px);
    font-weight: 400;
    color: var(--navy);
    margin-bottom: 14px;
    line-height: 1.2;
  }
  p {
    color: var(--text-muted);
    margin-bottom: 28px;
    font-size: 15px;
  }
  .cta {
    display: inline-block;
    background: var(--gold);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 28px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .cta:hover { background: var(--gold-light); }
  .sub-cta {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .sub-cta a { color: var(--navy); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">C.A.S.E. Clarity</div>
    </div>
  </header>
  <main>
    <div class="card">
      <div class="eyebrow">Subscription active</div>
      <h1>Thank you for subscribing</h1>
      <p>Your subscription is confirmed. Billing and access details are tied to your account. Open the portal to use all six tools across your active case capacity.</p>
      <a class="cta" href="case-clarity-portal.html">Go to portal</a>
      <span class="sub-cta">Questions? <a href="mailto:traci.johnson@rcmspllc.com">Contact RCMS</a></span>
    </div>
  </main>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var uid = p.get('uid');
      if (uid) {
        try {
          sessionStorage.setItem('case_clarity_checkout_uid', uid);
        } catch (e) { /* ignore */ }
      }
    })();
  </script>
</body>
</html>
