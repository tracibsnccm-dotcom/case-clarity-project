<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.S.E. Clarity — Attorney sign in</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-guard.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f6f3ed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-top: 3px solid #0c1c34;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 2px 12px rgba(12,28,52,0.06);
        }
        .brand {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #b8922a;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 26px;
            font-weight: normal;
            color: #0c1c34;
            margin: 0 0 8px;
            letter-spacing: 0.02em;
        }
        .subtitle {
            font-size: 15px;
            color: #3a4a5a;
            margin: 0 0 32px;
            line-height: 1.7;
        }
        .field-label {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #6a7a8a;
            display: block;
            margin-bottom: 6px;
        }
        .field-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d6d0c4;
            background: #faf8f4;
            font-size: 14px;
            color: #0e1c2e;
            font-family: 'Georgia', 'Times New Roman', serif;
            outline: none;
        }
        .field-input:focus {
            border-color: #b8922a;
        }
        .field-group {
            margin-bottom: 18px;
        }
        .btn-primary {
            width: 100%;
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 14px 40px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: #1a2c44;
        }
        .btn-primary:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        .error-message {
            color: #c0392b;
            font-size: 13px;
            margin-top: 16px;
            padding: 10px 12px;
            background: #fdf1f0;
            border: 1px solid #f5c6cb;
            display: none;
            line-height: 1.5;
        }
        .error-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">Reconcile Care Management Services</div>
        <h1>Attorney sign in</h1>
        <p class="subtitle">Sign in with the email and password for your paid portal account.</p>

        <form id="login-form" novalidate>
            <div class="field-group">
                <label class="field-label" for="email">Email</label>
                <input type="email" id="email" class="field-input" name="email" autocomplete="email" required>
            </div>
            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <input type="password" id="password" class="field-input" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary" id="btn-submit">Sign in</button>
        </form>

        <div id="error-message" class="error-message" role="alert"></div>
    </div>

    <script>
        (function () {
            function showError(msg) {
                var el = document.getElementById('error-message');
                if (!el) return;
                el.textContent = msg || 'Sign in failed. Please try again.';
                el.classList.add('visible');
            }

            function hideError() {
                var el = document.getElementById('error-message');
                if (!el) return;
                el.textContent = '';
                el.classList.remove('visible');
            }

            function friendlyAuthMessage(err) {
                if (!err) return 'Sign in failed. Please try again.';
                var m = String(err.message || err).toLowerCase();
                if (m.indexOf('invalid login') !== -1 || m.indexOf('invalid credentials') !== -1) {
                    return 'Invalid email or password.';
                }
                if (m.indexOf('email not confirmed') !== -1) {
                    return 'Please confirm your email address before signing in.';
                }
                return err.message || 'Sign in failed. Please try again.';
            }

            document.addEventListener('DOMContentLoaded', async function () {
                await redirectIfLoggedIn();
                var sess = window.supabaseClient
                    ? await window.supabaseClient.auth.getSession()
                    : { data: { session: null } };
                if (sess && sess.data && sess.data.session) return;

                var form = document.getElementById('login-form');
                var btn = document.getElementById('btn-submit');
                if (!form || !window.supabaseClient) {
                    if (!window.supabaseClient) showError('Application configuration error. Check Supabase settings in js/supabase-client.js.');
                    return;
                }

                form.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    hideError();

                    var email = (document.getElementById('email') && document.getElementById('email').value || '').trim();
                    var password = (document.getElementById('password') && document.getElementById('password').value) || '';

                    if (!email || !password) {
                        showError('Please enter your email and password.');
                        return;
                    }

                    btn.disabled = true;
                    try {
                        var res = await window.supabaseClient.auth.signInWithPassword({ email: email, password: password });
                        if (res.error) {
                            showError(friendlyAuthMessage(res.error));
                            return;
                        }
                        window.location.href = '/dashboard.html';
                    } catch (err) {
                        showError(friendlyAuthMessage(err));
                    } finally {
                        btn.disabled = false;
                    }
                });
            });
        })();
    </script>
</body>
</html>
