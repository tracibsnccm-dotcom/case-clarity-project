<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.A.S.E. Clarity Assessments Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-guard.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f6f3ed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-top: 3px solid #0c1c34;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 2px 12px rgba(12,28,52,0.06);
        }
        .brand {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #b8922a;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 26px;
            font-weight: normal;
            color: #0c1c34;
            margin: 0 0 8px;
            letter-spacing: 0.02em;
        }
        .subtitle {
            font-size: 15px;
            color: #3a4a5a;
            margin: 0 0 32px;
            line-height: 1.7;
        }
        .field-label {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #6a7a8a;
            display: block;
            margin-bottom: 6px;
        }
        .field-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d6d0c4;
            background: #faf8f4;
            font-size: 14px;
            color: #0e1c2e;
            font-family: 'Georgia', 'Times New Roman', serif;
            outline: none;
        }
        .field-input:focus {
            border-color: #b8922a;
        }
        .btn-primary {
            width: 100%;
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 14px 40px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-top: 20px;
        }
        .btn-primary:hover {
            background: #1a2c44;
        }
        .btn-primary:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        .error-message {
            color: #c0392b;
            font-size: 12px;
            margin-top: 10px;
            padding: 10px;
            background: #fdf1f0;
            border: 1px solid #f5c6cb;
            display: none;
        }
        .info {
            font-size: 11px;
            color: #9aabb8;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">Reconcile Care Management Services</div>
        <h1>C.A.S.E. Clarity Assessments Login</h1>
        <p class="subtitle">Enter your CCP# and PIN to access the Forensic Intelligence System.</p>

        <form id="login-form" novalidate>
            <div class="field-label">CCP#</div>
            <input type="text" id="ccp" class="field-input" placeholder="CCP-123456" autocomplete="off">

            <div class="field-label" style="margin-top: 16px;">PIN</div>
            <input type="password" id="pin" class="field-input" placeholder="6-digit PIN" maxlength="6" autocomplete="off">

            <button type="submit" class="btn-primary" id="btn-submit">ACCESS ASSESSMENT PORTAL</button>
        </form>

        <div id="error-message" class="error-message" role="alert"></div>
        <div id="expired-message" class="error-message" style="display:none;background:#fff3cd;border-color:#ffc107;color:#856404;"></div>
        <p class="info">Credentials were provided in your trial access email. <a href="trial-signup.html" style="color:#b09837;text-decoration:underline;">New user? Sign up here.</a></p>
    </div>

    <script>
        (function () {
            function showError(message) {
                var errorEl = document.getElementById('error-message');
                errorEl.textContent = message;
                errorEl.style.display = 'block';
                document.getElementById('expired-message').style.display = 'none';
            }

            function hideErrors() {
                document.getElementById('error-message').style.display = 'none';
                document.getElementById('expired-message').style.display = 'none';
            }

            document.addEventListener('DOMContentLoaded', async function () {
                if (typeof redirectIfLoggedIn === 'function') {
                    await redirectIfLoggedIn();
                }
                var client = window.supabaseClient;
                if (!client) {
                    showError('Application configuration error. Check js/supabase-client.js.');
                    return;
                }

                var form = document.getElementById('login-form');
                var btn = document.getElementById('btn-submit');
                form.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    hideErrors();

                    var ccp = (document.getElementById('ccp').value || '').trim();
                    var pin = (document.getElementById('pin').value || '').trim();
                    var errorEl = document.getElementById('error-message');
                    var expiredEl = document.getElementById('expired-message');

                    if (!ccp || !pin) {
                        showError('Please enter both CCP# and PIN');
                        return;
                    }
                    if (!ccp.startsWith('CCP-')) {
                        showError('CCP# must start with CCP-');
                        return;
                    }
                    if (pin.length !== 6 || !/^\d+$/.test(pin)) {
                        showError('PIN must be a 6-digit number');
                        return;
                    }

                    btn.disabled = true;
                    try {
                        var res = await client
                            .from('trial_users')
                            .select('*')
                            .eq('ccp', ccp)
                            .eq('pin', pin)
                            .single();

                        if (res.error || !res.data) {
                            showError('Invalid CCP# or PIN');
                            return;
                        }

                        var user = res.data;
                        if (user.status !== 'trial_active') {
                            showError('Your trial account is not active. Contact support.');
                            return;
                        }

                        var trialStart = new Date(user.trial_start_at);
                        var now = new Date();
                        var daysElapsed = Math.floor((now - trialStart) / (1000 * 60 * 60 * 24));

                        if (daysElapsed >= 7) {
                            expiredEl.innerHTML =
                                'Your trial has ended. Purchase to continue. ' +
                                '<a href="pricing.html" style="color:#1a2e3f;font-weight:bold;text-decoration:underline;">View plans</a>';
                            expiredEl.style.display = 'block';
                            errorEl.style.display = 'none';
                            return;
                        }

                        localStorage.setItem('ccp', ccp);
                        localStorage.setItem('email', user.email || '');
                        localStorage.setItem('trial_start_at', user.trial_start_at);
                        localStorage.setItem('status', user.status);
                        localStorage.setItem('user_logged_in', 'true');
                        localStorage.setItem('user_id', user.id);

                        window.location.href = 'dashboard.html';
                    } catch (err) {
                        showError('Login failed. Please try again.');
                        console.error(err);
                    } finally {
                        btn.disabled = false;
                    }
                });
            });
        })();
    </script>
</body>
</html>
