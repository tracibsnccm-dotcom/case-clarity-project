<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Clarity Project - Dashboard</title>
    <style>
        .collapsible-header {
            background: #f1f0eb;
            padding: 16px 24px;
            margin: 16px 0 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #d6d0c4;
            border-left: 3px solid #b8922a;
        }
        .collapsible-header:hover {
            background: #e8e3d8;
        }
        .collapsible-content {
            display: none;
            padding: 16px 0;
        }
        .collapsible-content.expanded {
            display: block;
        }
        .arrow {
            font-size: 18px;
            transition: transform 0.2s;
        }
        .arrow.expanded {
            transform: rotate(90deg);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f6f3ed;
            color: #0e1c2e;
        }
        .app-header {
            background: #0c1c34;
            color: #e8e2d4;
            padding: 0 48px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #b8922a;
        }
        .app-header-left { display: flex; align-items: baseline; gap: 20px; }
        .app-header-brand { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #b8922a; }
        .app-header-title { font-size: 15px; letter-spacing: 0.04em; }
        .app-header-right { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #6a8aaa; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 32px;
        }
        
        .timer-card {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-left: 3px solid #b8922a;
            padding: 20px 32px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #b8922a;
        }
        .timer-value {
            font-size: 24px;
            color: #0c1c34;
            font-weight: bold;
        }
        .timer-warning {
            color: #c0392b;
        }
        
        .case-section {
            margin-bottom: 48px;
        }
        .case-section-active {
            padding: 28px 28px 8px;
            background: linear-gradient(180deg, #f0f4f8 0%, #faf8f4 100%);
            border: 1px solid #c5d0dc;
            border-left: 4px solid #0c1c34;
            border-radius: 2px;
        }
        .case-section-retro {
            padding: 28px 28px 8px;
            background: #f7f5f0;
            border: 1px solid #d6d0c4;
            border-left: 4px solid #8b6914;
            border-radius: 2px;
        }
        .tool-card-active {
            border-top-color: #0c1c34;
            box-shadow: 0 1px 3px rgba(12, 28, 52, 0.06);
        }
        .tool-card-retro {
            border-top-color: #8b6914;
            background: #fffefb;
        }
        .tool-card-locked .btn-launch {
            background: #a8a49a;
            cursor: not-allowed;
        }
        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d6d0c4;
        }
        .case-title {
            font-size: 20px;
            color: #0c1c34;
        }
        .case-progress {
            font-size: 14px;
            color: #b8922a;
        }
        .case-reference {
            margin-bottom: 24px;
        }
        .reference-input {
            padding: 10px 14px;
            border: 1px solid #d6d0c4;
            background: #faf8f4;
            width: 400px;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-right: 10px;
        }
        .btn-save {
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 10px 24px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        .tool-card {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-top: 3px solid #0c1c34;
            padding: 24px;
        }
        .tool-name {
            font-size: 18px;
            color: #0c1c34;
            margin-bottom: 8px;
        }
        .tool-desc {
            font-size: 13px;
            color: #3a4a5a;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .tool-status {
            display: inline-block;
            padding: 4px 12px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .status-not-started {
            background: #e8e3d8;
            color: #6a7a8a;
        }
        .status-in-progress {
            background: #fff3d6;
            color: #b8922a;
        }
        .status-complete {
            background: #0c1c34;
            color: #b8922a;
        }
        .btn-launch {
            width: 100%;
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 12px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-launch:disabled {
            background: #c0bbad;
            cursor: not-allowed;
        }
        
        .reports-section {
            margin-top: 48px;
            padding: 32px;
            background: #fff;
            border: 1px solid #d6d0c4;
        }
        .reports-title {
            font-size: 18px;
            color: #0c1c34;
            margin-bottom: 24px;
        }
        .reports-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .report-card {
            padding: 24px;
            background: #faf8f4;
            border: 1px solid #d6d0c4;
        }
        .report-card.locked {
            opacity: 0.7;
        }
        .report-card h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #0c1c34;
        }
        .report-status {
            font-size: 12px;
            color: #b8922a;
            margin-bottom: 20px;
        }
        .btn-report {
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 10px 20px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-report:disabled {
            background: #c0bbad;
            cursor: not-allowed;
        }
        
        .expired-message {
            text-align: center;
            padding: 60px;
            background: #fff;
            border: 1px solid #d6d0c4;
        }
        .expired-message h2 {
            color: #c0392b;
            margin-bottom: 20px;
        }
        .expired-message .btn-primary {
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 14px 40px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        .expired-message .btn-primary:hover {
            background: #1a2c44;
        }
        
        @media (max-width: 900px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
            .reports-grid {
                grid-template-columns: 1fr;
            }
            .case-entry-grid {
                grid-template-columns: 1fr !important;
            }
        }
        .case-entry-block {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e8e4dc;
        }
        .case-entry-block:last-of-type {
            border-bottom: none;
            margin-bottom: 20px;
            padding-bottom: 0;
        }
        .case-entry-field {
            margin-bottom: 16px;
        }
        .case-entry-field label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #3a4a5a;
        }
        .case-entry-field input,
        .case-entry-field select {
            width: 100%;
            max-width: 480px;
            padding: 10px;
            border: 1px solid #d6d0c4;
            background: #faf8f4;
            font-family: inherit;
        }
        .dashboard-heading {
            font-size: 28px;
            color: #0c1c34;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-header-left">
            <span class="app-header-brand">Reconcile Care Management Services</span>
            <span class="app-header-div">|</span>
            <span class="app-header-title">Case Clarity Project</span>
        </div>
        <span class="app-header-right" id="assessment-id-display"></span>
    </header>

    <div class="container" id="dashboard-content">
        <!-- Content loaded dynamically -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase setup
        const SUPABASE_URL = 'https://zmjxyspizdqhrtdcgkwk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptanh5c3BpemRxaHJ0ZGNna3drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4MjQ1NDcsImV4cCI6MjA4NTE4NDU0N30.szuVr87xdq1aqYpaM6p390f48ozj4CENU4ksg8vumhM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== REPORT STORAGE (No Database Required) =====
        try {
            window.reportData = JSON.parse(sessionStorage.getItem('reportData') || 'null') || { active: {}, retro: {} };
        } catch (e) {
            window.reportData = { active: {}, retro: {} };
        }
        if (!window.reportData.active) window.reportData.active = {};
        if (!window.reportData.retro) window.reportData.retro = {};

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'ASSESSMENT_COMPLETE') {
                const { caseType, tool, data } = event.data;
                if (!tool) return;
                let key = caseType === 'retrospective' || caseType === 'retro' ? 'retro' : 'active';
                window.reportData[key][tool] = {
                    data: data,
                    completedAt: new Date().toISOString()
                };
                sessionStorage.setItem('reportData', JSON.stringify(window.reportData));
                updateReportUI();
                console.log('✅ Saved ' + tool + ' results for ' + key + ' case');
            }
        });

        function updateReportUI() {
            const activeTools = Object.keys(window.reportData.active || {}).length;
            const retroTools = Object.keys(window.reportData.retro || {}).length;
            const activeComplete = activeTools === 6;
            const retroComplete = retroTools === 6;

            var capA = document.getElementById('report-active-capture');
            var capR = document.getElementById('report-retro-capture');
            if (capA) {
                capA.textContent = activeComplete ? '✓ All 6 tools captured for print' : ('Captured for print: ' + activeTools + '/6');
            }
            if (capR) {
                capR.textContent = retroComplete ? '✓ All 6 tools captured for print' : ('Captured for print: ' + retroTools + '/6');
            }
            document.querySelectorAll('[data-report-btn="active"]').forEach(function(b) {
                b.disabled = !activeComplete;
            });
            document.querySelectorAll('[data-report-btn="retro"]').forEach(function(b) {
                b.disabled = !retroComplete;
            });
        }

        window.printActiveReports = function() {
            var tools = ['CCI', 'CSA', 'CAF', 'HSI', 'FCI', 'RRF'];
            var completed = tools.filter(function(t) { return window.reportData.active[t]; });
            if (completed.length === 6) {
                generateAndPrintReports('active', window.reportData.active);
            } else {
                alert('Please complete all 6 Active assessments first.');
            }
        };

        window.printRetroReports = function() {
            var tools = ['CCI', 'CSA', 'CAF', 'HSI', 'FCI', 'RRF'];
            var completed = tools.filter(function(t) { return window.reportData.retro[t]; });
            if (completed.length === 6) {
                generateAndPrintReports('retro', window.reportData.retro);
            } else {
                alert('Please complete all 6 Retrospective assessments first.');
            }
        };

        function generateAndPrintReports(caseType, data) {
            var printWindow = window.open('', '_blank');
            if (!printWindow) {
                alert('Please allow pop-ups for this site to print reports.');
                return;
            }
            var titleLabel = caseType === 'active' ? 'Active' : 'Retrospective';
            var html = '<!DOCTYPE html><html><head><title>' + titleLabel + ' Case Reports</title><style>' +
                'body { font-family: Georgia, serif; margin: 40px; }' +
                'h1 { color: #0c1c34; border-bottom: 2px solid #b8922a; padding-bottom: 10px; }' +
                'h2 { color: #0c1c34; margin-top: 30px; }' +
                '.report-section { margin-bottom: 40px; page-break-after: always; }' +
                '.field { margin: 10px 0; }' +
                '.label { font-weight: bold; color: #6a7a8a; }' +
                '@media print { body { margin: 0.5in; } }' +
                '</style></head><body>' +
                '<h1>' + titleLabel + ' Case Assessment Reports</h1>' +
                '<p>Generated: ' + new Date().toLocaleString() + '</p>';

            var toolList = ['CCI', 'CSA', 'CAF', 'HSI', 'FCI', 'RRF'];
            toolList.forEach(function(tool) {
                if (data[tool]) {
                    html += '<div class="report-section"><h2>' + tool + ' Assessment</h2>' +
                        '<p>Completed: ' + new Date(data[tool].completedAt).toLocaleString() + '</p>' +
                        '<div style="margin-top: 20px;">' + formatToolData(tool, data[tool].data) + '</div></div>';
                }
            });
            html += '</body></html>';
            printWindow.document.write(html);
            printWindow.document.close();
            printWindow.print();
        }

        function formatToolData(tool, data) {
            if (!data) return '<p>No data available</p>';
            var raw = JSON.stringify(data, null, 2);
            var esc = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return '<pre style="background: #f5f5f5; padding: 15px; overflow-x: auto;">' + esc + '</pre>';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updateReportUI);
        } else {
            updateReportUI();
        }

        // Tool configuration
        const TOOL_ORDER = ['CCI', 'CSA', 'CAF', 'HSI', 'FCI', 'RRF'];
        const ACTIVE_NUMBERED_TITLES = {
            'CCI': '1. Case Complexity Index',
            'CSA': '2. Clinical Sequencing Auditor',
            'CAF': '3. C.A.R.E. Access Friction Score',
            'HSI': '4. Holistic Stability Index',
            'FCI': '5. Functional Capacity Index',
            'RRF': '6. Recovery Risk Forecaster'
        };
        const TOOL_INFO = {
            'CCI': {
                name: 'Case Complexity Index',
                desc: 'Evaluates injury severity, life disruption, and care coordination demands.',
                url: 'https://case-complexity-index-e0hdp2mvz-tracis-projects-26fd65a2.vercel.app'
            },
            'CSA': {
                name: 'Clinical Sequencing Auditor',
                desc: 'Assesses alignment with the 7 Rights of Injury Care Management.',
                url: 'https://care-auditor-cvds0k5dx-tracis-projects-26fd65a2.vercel.app'
            },
            'CAF': {
                name: 'C.A.R.E. Access Friction Score',
                desc: 'Identifies insurance, referral, and provider access barriers.',
                url: 'https://care-access-friction-score-133sg5wgb-tracis-projects-26fd65a2.vercel.app'
            },
            'HSI': {
                name: 'Holistic Stability Index',
                desc: 'Evaluates stability across the 4Ps of Wellness.',
                url: 'https://holistic-stability-index-1bbz5j5r7-tracis-projects-26fd65a2.vercel.app'
            },
            'FCI': {
                name: 'Functional Capacity Index',
                desc: 'Assesses capacity to return to work and maintain independence.',
                url: 'https://fci-portal-clean-4jbc10zs1-tracis-projects-26fd65a2.vercel.app'
            },
            'RRF': {
                name: 'Recovery Risk Forecaster',
                desc: 'Identifies factors affecting recovery trajectory.',
                url: 'https://recovery-risk-forecaster-n7s9o0uzm-tracis-projects-26fd65a2.vercel.app'
            }
        };

        // Check authentication
        const assessmentId = localStorage.getItem('assessment_id');
        const sessionId = localStorage.getItem('session_id');

        if (!assessmentId || !sessionId) {
            window.location.href = 'login.html';
        }

        document.getElementById('assessment-id-display').textContent = assessmentId;

        window.toggleSection = function (sectionId) {
            var content = document.getElementById(sectionId);
            var arrow = document.getElementById('arrow-' + sectionId.split('-')[0]);
            if (content) content.classList.toggle('expanded');
            if (arrow) arrow.classList.toggle('expanded');
        };

        window.updateCollapsibleProgress = function (activeComplete, retroComplete) {
            var ap = document.getElementById('active-progress');
            var rp = document.getElementById('retro-progress');
            if (ap != null && activeComplete != null) ap.textContent = activeComplete + '/6';
            if (rp != null && retroComplete != null) rp.textContent = retroComplete + '/6';
        };

        // Load dashboard
        loadDashboard();

        async function loadDashboard() {
            try {
                // Get session data
                const { data: session, error } = await supabaseClient
                    .from('assessment_sessions')
                    .select('*')
                    .eq('id', sessionId)
                    .single();

                if (error || !session) {
                    handleLogout();
                    return;
                }

                // Check expiration
                if (new Date() > new Date(session.expires_at)) {
                    await supabaseClient
                        .from('assessment_sessions')
                        .update({ status: 'expired' })
                        .eq('id', sessionId);
                    
                    showExpiredMessage();
                    return;
                }

                // Calculate progress
                const activeAssessments = session.active_case?.assessments || {};
                const retroAssessments = session.retropective_case?.assessments || {};
                
                const activeComplete = Object.values(activeAssessments)
                    .filter(a => a?.status === 'complete').length;
                const retroComplete = Object.values(retroAssessments)
                    .filter(a => a?.status === 'complete').length;
                
                const activeAllDone = activeComplete === 6;
                const retroAllDone = retroComplete === 6;

                // Calculate time remaining
                const expiresAt = new Date(session.expires_at);
                const now = new Date();
                const daysLeft = Math.ceil((expiresAt - now) / (1000 * 60 * 60 * 24));

                // Render dashboard
                renderDashboard(session, activeComplete, retroComplete, activeAllDone, retroAllDone, daysLeft);

            } catch (err) {
                console.error('Error loading dashboard:', err);
            }
        }

        function escapeAttr(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        function renderDashboard(session, activeComplete, retroComplete, activeAllDone, retroAllDone, daysLeft) {
            const container = document.getElementById('dashboard-content');
            
            const timerClass = daysLeft <= 2 ? 'timer-warning' : '';
            const ac = session.active_case || {};
            const rc = session.retrospective_case || {};
            const acName = escapeAttr(ac.name_case_id || ac.reference || '');
            const acDate = escapeAttr(ac.date_of_injury || '');
            const acMech = escapeAttr(ac.mechanism || '');
            const acType = ac.case_type === 'PI' || ac.case_type === 'WC' || ac.case_type === 'Disability' ? ac.case_type : '';
            const rcName = escapeAttr(rc.name_case_id || rc.reference || '');
            const rcDate = escapeAttr(rc.date_of_injury || '');
            const rcMech = escapeAttr(rc.mechanism || '');
            const rcType = rc.case_type === 'PI' || rc.case_type === 'WC' || rc.case_type === 'Disability' ? rc.case_type : '';
            const sel = function (cur, val) { return cur === val ? ' selected' : ''; };
            
            let html = `
                <div class="timer-card">
                    <span class="timer-label">Time Remaining</span>
                    <span class="timer-value ${timerClass}">${daysLeft} days</span>
                </div>

                <!-- ORIENTATION SECTION -->
                <div style="background: #f9f7f2; border: 1px solid #d6d0c4; border-left: 3px solid #b8922a; padding: 24px; margin-bottom: 32px;">
                  <h2 style="font-size: 20px; margin-bottom: 16px;">Before You Begin</h2>
                  <h3 style="font-size: 16px; margin-bottom: 12px;">Assessment Orientation</h3>
                  <p style="margin-bottom: 16px; line-height: 1.6;">This evaluation includes six forensic instruments designed to examine structural case factors affecting medical care progression, recovery trajectory, and litigation risk.</p>
                  
                  <h4 style="margin: 20px 0 10px;">What to Expect</h4>
                  <ul style="margin-bottom: 16px; padding-left: 20px;">
                    <li>You will complete the instruments using two cases: one active case and one previously closed case.</li>
                    <li>Case information will be entered once and applied across all six instruments.</li>
                    <li>Each instrument typically requires approximately 10–15 minutes to complete.</li>
                    <li>Estimated total assessment time: approximately 60–90 minutes.</li>
                    <li>Most attorneys complete the assessment over multiple sessions during the 72-hour access period.</li>
                  </ul>
                  
                  <h4 style="margin: 20px 0 10px;">Access Window</h4>
                  <p>Your 72-hour assessment window is now active. Progress is automatically saved. You may log out and return at any time before expiration.</p>
                  
                  <h4 style="margin: 20px 0 10px;">Important Note</h4>
                  <p>The instruments do not function as simple calculators. Each tool evaluates structural elements of case progression, treatment sequencing, and recovery dynamics.</p>
                </div>

                <!-- CASE ENTRY SECTION -->
                <div style="background: #fff; border: 1px solid #d6d0c4; padding: 24px; margin-bottom: 32px;">
                  <h2 style="font-size: 20px; margin-bottom: 16px;">Enter Your Case Information</h2>
                  <p style="margin-bottom: 20px;">Provide basic information for both cases. This information will be used across all six assessment instruments — you will not be asked to re-enter it within each tool.</p>
                  
                  <div style="margin-bottom: 20px; padding: 12px; background: #f1f0eb; border-left: 3px solid #b8922a;">
                    <p style="font-size: 14px;"><strong>Data Storage Notice:</strong> Case information entered here is stored only during the active 72-hour assessment window. All case data, instrument responses, and generated reports are automatically deleted when the assessment period expires.</p>
                  </div>
                  
                  <div class="case-entry-block">
                    <h3 style="font-size: 17px; color: #0c1c34; margin-bottom: 18px;">Active Case</h3>
                    <div class="case-entry-field">
                      <label for="active-name-case-id">Name / Case ID</label>
                      <input type="text" id="active-name-case-id" placeholder="e.g., Smith v. Carrier" value="${acName}">
                    </div>
                    <div class="case-entry-field">
                      <label for="active-date-injury">Date of Injury / Loss</label>
                      <input type="date" id="active-date-injury" value="${acDate}">
                    </div>
                    <div class="case-entry-field">
                      <label for="active-mechanism">Mechanism of Injury</label>
                      <input type="text" id="active-mechanism" placeholder="e.g., MVA, slip and fall" value="${acMech}">
                    </div>
                    <div class="case-entry-field">
                      <label for="active-case-type">Case Type</label>
                      <select id="active-case-type">
                        <option value="">Select…</option>
                        <option value="PI"${sel(acType, 'PI')}>PI</option>
                        <option value="WC"${sel(acType, 'WC')}>WC</option>
                        <option value="Disability"${sel(acType, 'Disability')}>Disability</option>
                      </select>
                    </div>
                  </div>
                  <div class="case-entry-block">
                    <h3 style="font-size: 17px; color: #0c1c34; margin-bottom: 18px;">Retrospective (closed case)</h3>
                    <div class="case-entry-field">
                      <label for="retro-name-case-id">Name / Case ID</label>
                      <input type="text" id="retro-name-case-id" placeholder="e.g., Jones v. Carrier" value="${rcName}">
                    </div>
                    <div class="case-entry-field">
                      <label for="retro-date-injury">Date of Injury / Loss</label>
                      <input type="date" id="retro-date-injury" value="${rcDate}">
                    </div>
                    <div class="case-entry-field">
                      <label for="retro-mechanism">Mechanism of Injury</label>
                      <input type="text" id="retro-mechanism" placeholder="e.g., work injury" value="${rcMech}">
                    </div>
                    <div class="case-entry-field">
                      <label for="retro-case-type">Case Type</label>
                      <select id="retro-case-type">
                        <option value="">Select…</option>
                        <option value="PI"${sel(rcType, 'PI')}>PI</option>
                        <option value="WC"${sel(rcType, 'WC')}>WC</option>
                        <option value="Disability"${sel(rcType, 'Disability')}>Disability</option>
                      </select>
                    </div>
                  </div>
                  <button type="button" id="save-case-info" style="background: #0c1c34; color: white; border: none; padding: 10px 24px; cursor: pointer;">Save Case Information</button>
                  <span style="margin-left: 16px; font-size: 13px; color: #666;">You may edit this information from the dashboard at any time during the assessment window.</span>
                </div>

                <h1 class="dashboard-heading">Assessment Dashboard</h1>

            `;

            // Active Case Section
            html += `
                <div class="case-section case-section-active">
                    <h2 style="font-size: 20px; margin: 32px 0 16px;">Active Case — Recommended Order</h2>
                    <p style="margin-bottom: 20px; color: #4a5568; line-height: 1.6;">It is recommended that you complete in order, but you may choose any sequence. Reports will unlock for download once all assessments in this section are completed.</p>
                    <p style="margin-bottom: 24px; color: #4a5568; line-height: 1.6; padding: 16px; background: #f4f6f8; border-left: 3px solid #0c1c34;">Consider beginning with a case that has stalled or where clinical direction is unclear. This process also provides a framework for new cases, offering guidance from the outset.</p>
                    <div class="collapsible-section">
                      <div class="collapsible-header" onclick="toggleSection('active-tools')">
                        <span><strong>Active Case Tools</strong> — <span id="active-progress">${activeComplete}/6</span> completed</span>
                        <span class="arrow expanded" id="arrow-active">▶</span>
                      </div>
                      <div class="collapsible-content expanded" id="active-tools">
                    <div class="tools-grid">
            `;

            const activeAssessments = session.active_case?.assessments || {};
            TOOL_ORDER.forEach((toolKey) => {
                const tool = TOOL_INFO[toolKey];
                const status = activeAssessments[toolKey]?.status || 'not_started';
                html += getToolCard(toolKey, tool, status, 'active', {
                    displayName: ACTIVE_NUMBERED_TITLES[toolKey],
                    cardClass: 'tool-card-active',
                    launchDisabled: status === 'complete',
                    lockedBySequence: false
                });
            });

            html += `</div></div></div></div>`;

            // Retrospective Case Section
            html += `
                <div class="case-section case-section-retro">
                    <h2 style="font-size: 20px; margin: 48px 0 16px;">Retrospective Case</h2>
                    <p style="margin-bottom: 24px; color: #4a5568; line-height: 1.6; padding: 16px; background: #faf6f0; border-left: 3px solid #8b6914;">For cases that have already settled, this review may identify factors that could have influenced the outcome or settlement value.</p>
                    <div class="collapsible-section">
                      <div class="collapsible-header" onclick="toggleSection('retro-tools')">
                        <span><strong>Retrospective Case Tools</strong> — <span id="retro-progress">${retroComplete}/6</span> completed</span>
                        <span class="arrow" id="arrow-retro">▶</span>
                      </div>
                      <div class="collapsible-content" id="retro-tools">
                    <div class="tools-grid">
            `;

            const retroAssessments = session.retrospective_case?.assessments || {};
            TOOL_ORDER.forEach(toolKey => {
                const tool = TOOL_INFO[toolKey];
                const status = retroAssessments[toolKey]?.status || 'not_started';
                const retroLocked = !activeAllDone;
                html += getToolCard(toolKey, tool, status, 'retrospective', {
                    displayName: tool.name,
                    cardClass: 'tool-card-retro',
                    launchDisabled: status === 'complete' || retroLocked,
                    lockedBySequence: retroLocked && status !== 'complete'
                });
            });

            html += `</div></div></div></div>`;

            const activeCaptured = Object.keys(window.reportData.active || {}).length;
            const retroCaptured = Object.keys(window.reportData.retro || {}).length;
            const activePrintReady = activeCaptured === 6;
            const retroPrintReady = retroCaptured === 6;

            // Reports Section
            html += `
                <div class="reports-section">
                    <h2 class="reports-title">Available Reports</h2>
                    <p style="font-size: 13px; color: #6a7a8a; margin-bottom: 20px;">Print uses data captured when each tool sends completion to this dashboard (same browser session). Open tools from this page so results can be saved.</p>
                    <div class="reports-grid">
                        <div class="report-card ${!activePrintReady ? 'locked' : ''}">
                            <h3>Active Case Report</h3>
                            <div class="report-status">
                                ${activeAllDone ? '✓ All active assessments marked complete' : '🔒 Complete all 6 active assessments (dashboard)'}
                            </div>
                            <div id="report-active-capture" style="font-size: 13px; color: #b8922a; margin-bottom: 16px;">${activePrintReady ? '✓ All 6 tools captured for print' : 'Captured for print: ' + activeCaptured + '/6'}</div>
                            <button type="button" class="btn-report" data-report-btn="active" ${!activePrintReady ? 'disabled' : ''} onclick="printActiveReports()">Download</button>
                            <button type="button" class="btn-report" data-report-btn="active" ${!activePrintReady ? 'disabled' : ''} onclick="printActiveReports()">Print</button>
                        </div>
                        
                        <div class="report-card ${!retroPrintReady ? 'locked' : ''}">
                            <h3>Retrospective Case Report</h3>
                            <div class="report-status">
                                ${retroAllDone ? '✓ All retrospective assessments marked complete' : '🔒 Complete all 6 retrospective assessments (dashboard)'}
                            </div>
                            <div id="report-retro-capture" style="font-size: 13px; color: #b8922a; margin-bottom: 16px;">${retroPrintReady ? '✓ All 6 tools captured for print' : 'Captured for print: ' + retroCaptured + '/6'}</div>
                            <button type="button" class="btn-report" data-report-btn="retro" ${!retroPrintReady ? 'disabled' : ''} onclick="printRetroReports()">Download</button>
                            <button type="button" class="btn-report" data-report-btn="retro" ${!retroPrintReady ? 'disabled' : ''} onclick="printRetroReports()">Print</button>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;

            document.getElementById('save-case-info').addEventListener('click', saveCaseInfo);
            updateReportUI();
            updateCollapsibleProgress(activeComplete, retroComplete);
        }

        async function saveCaseInfo() {
            const activeName = document.getElementById('active-name-case-id').value.trim();
            const retroName = document.getElementById('retro-name-case-id').value.trim();

            const { data: session, error } = await supabaseClient
                .from('assessment_sessions')
                .select('active_case, retrospective_case')
                .eq('id', sessionId)
                .single();

            if (error || !session) {
                alert('Could not save. Please try again.');
                return;
            }

            const activeCase = session.active_case || { assessments: {} };
            const retroCase = session.retrospective_case || { assessments: {} };
            if (!activeCase.assessments) activeCase.assessments = {};
            if (!retroCase.assessments) retroCase.assessments = {};

            activeCase.name_case_id = activeName;
            activeCase.reference = activeName;
            activeCase.date_of_injury = document.getElementById('active-date-injury').value || '';
            activeCase.mechanism = document.getElementById('active-mechanism').value.trim();
            activeCase.case_type = document.getElementById('active-case-type').value || '';

            retroCase.name_case_id = retroName;
            retroCase.reference = retroName;
            retroCase.date_of_injury = document.getElementById('retro-date-injury').value || '';
            retroCase.mechanism = document.getElementById('retro-mechanism').value.trim();
            retroCase.case_type = document.getElementById('retro-case-type').value || '';

            await supabaseClient
                .from('assessment_sessions')
                .update({ active_case: activeCase, retrospective_case: retroCase })
                .eq('id', sessionId);

            alert('Case information saved');
        }

        function getToolCard(toolKey, tool, status, caseType, opts) {
            opts = opts || {};
            const displayName = opts.displayName || tool.name;
            const cardExtra = opts.cardClass ? ' ' + opts.cardClass : '';
            const lockedClass = opts.lockedBySequence ? ' tool-card-locked' : '';
            let statusClass = 'status-not-started';
            let statusText = 'NOT STARTED';
            
            if (status === 'in_progress') {
                statusClass = 'status-in-progress';
                statusText = 'IN PROGRESS';
            } else if (status === 'complete') {
                statusClass = 'status-complete';
                statusText = 'COMPLETE';
            }

            let btnLabel = 'Launch Assessment';
            if (status === 'complete') btnLabel = 'Completed';
            else if (opts.lockedBySequence) btnLabel = caseType === 'active' ? 'Complete previous step first' : 'Complete Active Case first';

            return `
                <div class="tool-card${cardExtra}${lockedClass}">
                    <h3 class="tool-name">${displayName}</h3>
                    <p class="tool-desc">${tool.desc}</p>
                    <div class="tool-status ${statusClass}">${statusText}</div>
                    <button class="btn-launch" 
                            onclick="launchTool('${toolKey}', '${caseType}')"
                            ${opts.launchDisabled ? 'disabled' : ''}>
                        ${btnLabel}
                    </button>
                </div>
            `;
        }

        window.launchTool = function(toolKey, caseType) {
            const tool = TOOL_INFO[toolKey];
            const url = new URL(tool.url);
            url.searchParams.set('session', sessionId);
            url.searchParams.set('assessmentId', assessmentId);
            url.searchParams.set('caseType', caseType);
            url.searchParams.set('tool', toolKey);
            
            window.open(url.toString(), `${toolKey}-${caseType}`, 'width=1400,height=900');
        };

        function showExpiredMessage() {
            document.getElementById('dashboard-content').innerHTML = `
                <div class="expired-message">
                    <h2>Access Expired</h2>
                    <p>Your 7-day assessment window has expired.</p>
                    <p>Please contact support if you need assistance.</p>
                    <button onclick="handleLogout()" class="btn-primary" style="margin-top: 20px;">Return to Login</button>
                </div>
            `;
        }

        window.handleLogout = function() {
            localStorage.clear();
            window.location.href = 'login.html';
        };

        // Refresh progress every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
