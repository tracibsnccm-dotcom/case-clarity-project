<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Clarity Project - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="trial-pinned-banner.css">
    <style>
        .collapsible-header {
            background: #f1f0eb;
            padding: 16px 24px;
            margin: 16px 0 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #d6d0c4;
            border-left: 3px solid #b8922a;
        }
        .collapsible-header:hover {
            background: #e8e3d8;
        }
        .collapsible-content {
            display: none;
            padding: 16px 0;
        }
        .collapsible-content.expanded {
            display: block;
        }
        .arrow {
            font-size: 18px;
            transition: transform 0.2s;
        }
        .arrow.expanded {
            transform: rotate(90deg);
        }
        .tool-preview {
            font-family: monospace;
            letter-spacing: 1px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f6f3ed;
            color: #0e1c2e;
        }
        .app-header {
            background: #0c1c34;
            color: #e8e2d4;
            padding: 0 48px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #b8922a;
        }
        .app-header-left { display: flex; align-items: center; flex-wrap: wrap; gap: 12px 20px; }
        .app-header-brand { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #b8922a; }
        .app-header-title { font-size: 15px; letter-spacing: 0.04em; }
        .app-header-right { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #6a8aaa; }
        .app-header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .btn-logout {
            background: transparent;
            color: #e8e2d4;
            border: 1px solid rgba(232, 226, 212, 0.45);
            padding: 8px 16px;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.08);
            border-color: #b8922a;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 32px;
        }
        
        .timer-card {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-left: 3px solid #b8922a;
            padding: 20px 32px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #b8922a;
        }
        .timer-value {
            font-size: 24px;
            color: #0c1c34;
            font-weight: bold;
        }
        .trial-countdown-clock {
            font-variant-numeric: tabular-nums;
            font-family: ui-monospace, "Cascadia Mono", Consolas, "Segoe UI Mono", monospace;
            font-weight: 600;
        }
        header .trial-countdown-clock {
            font-size: 14px;
        }
        .timer-warning {
            color: #c0392b;
        }
        
        .case-section {
            margin-bottom: 48px;
        }
        .case-section-active {
            padding: 28px 28px 8px;
            background: linear-gradient(180deg, #f0f4f8 0%, #faf8f4 100%);
            border: 1px solid #c5d0dc;
            border-left: 4px solid #0c1c34;
            border-radius: 2px;
        }
        .case-section-retro {
            padding: 28px 28px 8px;
            background: #f7f5f0;
            border: 1px solid #d6d0c4;
            border-left: 4px solid #8b6914;
            border-radius: 2px;
        }
        .tool-card-active {
            border-top-color: #0c1c34;
            box-shadow: 0 1px 3px rgba(12, 28, 52, 0.06);
        }
        .tool-card-retro {
            border-top-color: #8b6914;
            background: #fffefb;
        }
        .tool-card-locked .btn-launch {
            background: #a8a49a;
            cursor: not-allowed;
        }
        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d6d0c4;
        }
        .case-title {
            font-size: 20px;
            color: #0c1c34;
        }
        .case-progress {
            font-size: 14px;
            color: #b8922a;
        }
        .case-reference {
            margin-bottom: 24px;
        }
        .reference-input {
            padding: 10px 14px;
            border: 1px solid #d6d0c4;
            background: #faf8f4;
            width: 400px;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-right: 10px;
        }
        .btn-save {
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 10px 24px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        .tool-card {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-top: 3px solid #0c1c34;
            padding: 24px;
        }
        .tool-name {
            font-size: 18px;
            color: #0c1c34;
            margin-bottom: 8px;
        }
        .tool-desc {
            font-size: 13px;
            color: #3a4a5a;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .tool-status {
            display: inline-block;
            padding: 4px 12px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .status-not-started {
            background: #e8e3d8;
            color: #6a7a8a;
        }
        .status-in-progress {
            background: #fff3d6;
            color: #b8922a;
        }
        .status-complete {
            background: #1e5c3a;
            color: #e8f5ec;
            letter-spacing: 0.06em;
        }
        .btn-launch {
            width: 100%;
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 12px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-launch:disabled {
            background: #c0bbad;
            cursor: not-allowed;
        }
        
        .reports-section {
            margin-top: 48px;
            padding: 32px;
            background: #fff;
            border: 1px solid #d6d0c4;
        }
        .reports-title {
            font-size: 18px;
            color: #0c1c34;
            margin-bottom: 24px;
        }
        .reports-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .report-card {
            padding: 24px;
            background: #faf8f4;
            border: 1px solid #d6d0c4;
        }
        .report-card.locked {
            opacity: 0.7;
        }
        .report-card h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #0c1c34;
        }
        .report-status {
            font-size: 12px;
            color: #b8922a;
            margin-bottom: 20px;
        }
        .btn-report {
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 10px 20px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn-report:disabled {
            background: #c0bbad;
            cursor: not-allowed;
        }
        
        .expired-message {
            text-align: center;
            padding: 60px;
            background: #fff;
            border: 1px solid #d6d0c4;
        }
        .expired-message h2 {
            color: #c0392b;
            margin-bottom: 20px;
        }
        .expired-message .btn-primary {
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 14px 40px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        .expired-message .btn-primary:hover {
            background: #1a2c44;
        }
        
        @media (max-width: 900px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
            .reports-grid {
                grid-template-columns: 1fr;
            }
            .case-entry-grid {
                grid-template-columns: 1fr !important;
            }
        }
        .case-entry-block {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e8e4dc;
        }
        .case-entry-block:last-of-type {
            border-bottom: none;
            margin-bottom: 20px;
            padding-bottom: 0;
        }
        .case-entry-field {
            margin-bottom: 16px;
        }
        .case-entry-field label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #3a4a5a;
        }
        .case-entry-field input,
        .case-entry-field select {
            width: 100%;
            max-width: none;
            padding: 10px;
            border: 1px solid #d6d0c4;
            background: #faf8f4;
            font-family: inherit;
        }
        .case-entry-two-col {
            display: block;
            margin-bottom: 20px;
        }
        .case-entry-panel {
            border: 1px solid #d6d0c4;
            padding: 24px 28px;
            background: #faf8f4;
        }
        .case-entry-panel .case-entry-block {
            border: none;
            margin: 0;
            padding: 0;
        }
        .case-entry-fields-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 28px;
            margin-top: 4px;
        }
        @media (max-width: 700px) {
            .case-entry-fields-grid { grid-template-columns: 1fr; }
        }
        .inline-reports-card {
            margin-top: 24px;
            padding: 20px 22px;
            border: 1px solid #d6d0c4;
            background: #fff;
            max-width: 520px;
        }
        .case-section-active .inline-reports-card {
            border-left: 3px solid #0c1c34;
        }
        .case-section-retro .inline-reports-card {
            border-left: 3px solid #8b6914;
        }
        .dashboard-heading {
            font-size: 28px;
            color: #0c1c34;
            margin-bottom: 24px;
        }

        /* Trial: complete report (localStorage from all 6 tools) */
        .trial-report-panel {
            background: #fff;
            border: 1px solid #d6d0c4;
            border-left: 4px solid #0c1c34;
            padding: 28px 32px;
            margin-bottom: 32px;
        }
        .trial-report-panel h2 {
            font-size: 20px;
            color: #0c1c34;
            margin-bottom: 12px;
        }
        .trial-report-panel .trial-report-lead {
            font-size: 14px;
            color: #3a4a5a;
            line-height: 1.65;
            margin-bottom: 16px;
        }
        .trial-report-progress {
            font-size: 13px;
            color: #b8922a;
            margin-bottom: 16px;
            letter-spacing: 0.04em;
        }
        .trial-report-panel .btn-generate-complete {
            background: #b8922a;
            color: #0c1c34;
            border: none;
            padding: 12px 28px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        .trial-report-panel .btn-generate-complete:hover {
            background: #a67f24;
        }
        .trial-report-output {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e8e3d8;
        }
        .trial-report-toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
        }
        .trial-report-toolbar .btn-print-trial {
            background: #0c1c34;
            color: #e8e2d4;
            border: none;
            padding: 10px 22px;
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        .trial-report-toolbar .btn-print-trial:hover {
            background: #1a2c44;
        }
        .trial-report-meta {
            font-size: 12px;
            color: #6a7a8a;
            margin-bottom: 24px;
        }
        .trial-report-body {
            font-size: 14px;
            color: #0e1c2e;
            line-height: 1.65;
        }
        .trial-tool-block {
            background: #faf8f4;
            border: 1px solid #d6d0c4;
            padding: 20px 22px;
            margin-bottom: 20px;
            page-break-inside: avoid;
        }
        .trial-tool-block h3 {
            font-size: 15px;
            color: #0c1c34;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d6d0c4;
            letter-spacing: 0.04em;
        }
        .trial-tool-block .trial-kv {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 8px 20px;
            font-size: 13px;
        }
        @media (max-width: 600px) {
            .trial-tool-block .trial-kv {
                grid-template-columns: 1fr;
            }
        }
        .trial-tool-block .trial-k {
            color: #0c1c34;
            font-size: 13px;
            font-weight: 600;
            text-transform: none;
            letter-spacing: 0;
        }
        .trial-tool-block .trial-v {
            color: #0e1c2e;
            font-weight: 400;
        }
        .trial-tool-block .trial-note {
            margin-top: 12px;
            font-size: 12px;
            color: #5a6a7a;
            font-style: italic;
        }
        .trial-instrument-body {
            margin-top: 4px;
        }
        /* Snapshot hosts in tools use position:absolute;left:-9999px for capture; reset when embedded in reports */
        .trial-snapshot-embed > * {
            position: static !important;
            left: auto !important;
            top: auto !important;
            right: auto !important;
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            min-height: 0 !important;
            overflow: visible !important;
            pointer-events: auto !important;
            clip: auto !important;
            transform: none !important;
        }
        .trial-tool-block .trial-lead {
            font-size: 15px;
            color: #0c1c34;
            margin: 0 0 12px;
            line-height: 1.55;
        }
        .trial-tool-block .trial-lead strong {
            font-weight: 600;
            margin-right: 6px;
        }
        .trial-tool-block .trial-para {
            margin: 0 0 12px;
            font-size: 14px;
            line-height: 1.65;
            color: #0e1c2e;
        }
        .trial-tool-block .trial-para strong {
            font-weight: 600;
            color: #0c1c34;
            margin-right: 6px;
        }
        .trial-tool-block .trial-subhd {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6a7a8a;
            margin: 18px 0 10px;
            font-weight: 600;
        }
        .trial-tool-block ul.trial-list {
            margin: 6px 0 14px 1.25em;
            padding: 0;
            font-size: 14px;
            line-height: 1.55;
            color: #0e1c2e;
        }
        .trial-tool-block ul.trial-list li {
            margin-bottom: 6px;
        }
        .trial-tool-block ul.trial-list li strong {
            color: #0c1c34;
        }

        .comprehensive-report {
            max-width: 900px;
            font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        }
        .report-page-break {
            page-break-before: always;
            page-break-after: always;
            page-break-inside: avoid;
            border-top: 3px double #ccc;
            margin-top: 50px;
            padding-top: 40px;
            position: relative;
        }
        .report-page-break:first-of-type,
        .report-page-break.report-page-break--first {
            border-top: none;
            margin-top: 0;
            padding-top: 20px;
        }
        .comprehensive-report .comprehensive-tool-h2 {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 17px;
            color: #0c1c34;
            margin: 0 0 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d6d0c4;
            font-weight: 600;
        }

        /* Match FCI tool's original font */
        .fci-report, [class*="fci-"] {
            font-family: Georgia, 'Times New Roman', serif;
        }

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            html, body {
                height: auto !important;
                overflow: visible !important;
                background: #fff !important;
            }
            body {
                margin: 0.5in !important;
            }
            /* Hide app chrome; do NOT force display:block on report nodes (breaks tables, flex, grids). */
            .no-print,
            button,
            .tool-card,
            .app-header,
            .btn-logout,
            .logout-btn,
            .dashboard-header,
            .toolbar,
            .trial-report-toolbar,
            header.app-header {
                display: none !important;
            }
            body * {
                visibility: hidden;
            }
            .trial-print-root,
            .trial-print-root *,
            .comprehensive-report,
            .comprehensive-report * {
                visibility: visible !important;
            }
            .trial-print-root,
            .comprehensive-report {
                position: static !important;
                left: auto !important;
                top: auto !important;
                width: 100% !important;
                max-width: none !important;
                padding: 0 !important;
                margin: 0 !important;
                background: #fff !important;
                overflow: visible !important;
            }
            .report-page-break {
                page-break-before: always;
                page-break-after: always;
                page-break-inside: avoid;
                border-top: none;
                margin-top: 0;
                padding-top: 16px;
            }
            .report-page-break.report-page-break--first,
            .report-page-break:first-of-type {
                page-break-before: avoid;
            }
        }
    </style>
</head>
<body>
    <script>
    // Protect dashboard - redirect to login if not logged in
    if (!localStorage.getItem('user_logged_in')) {
        window.location.href = 'login.html';
    }

    <header class="app-header">
        <div class="app-header-left">
            <span class="app-header-brand">Reconcile Care Management Services</span>
            <span class="app-header-div">|</span>
            <span class="app-header-title">Case Clarity Project</span>

    <div class="container" id="dashboard-content">
        <!-- Content loaded dynamically -->
    </div>

    <script src="trial-pinned-banner.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function () {
        // Protect dashboard — redirect to login if not authenticated
        const ccp = localStorage.getItem('ccp');
        const email = localStorage.getItem('email');
        const userId = localStorage.getItem('user_id');

        if (!ccp || !email || !userId) {
            window.location.href = 'login.html';
            return;
        }

        /* CONFIG: Supabase — same keys as trial-signup.html / login.html; table: trial_users */
        const SUPABASE_URL = 'https://zmjxyspizdqhrtdcgkwk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptanh5c3BpemRxaHJ0ZGNna3drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4MjQ1NDcsImV4cCI6MjA4NTE4NDU0N30.szuVr87xdq1aqYpaM6p390f48ozj4CENU4ksg8vumhM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== REPORT STORAGE (No Database Required) =====
        try {
            window.reportData = JSON.parse(sessionStorage.getItem('reportData') || 'null') || { active: {}, retro: {} };
        } catch (e) {
            window.reportData = { active: {}, retro: {} };
        }
        if (!window.reportData.active) window.reportData.active = {};
        if (!window.reportData.retro) window.reportData.retro = {};

        function allToolsComplete() {
            for (var i = 1; i <= 6; i++) {
                if (!localStorage.getItem('tool' + i + '_complete')) {
                    return false;
                }
            }
            return true;
        }
        window.allToolsComplete = allToolsComplete;

        function countLocalToolsComplete() {
            var n = 0;
            for (var i = 1; i <= 6; i++) {
                if (localStorage.getItem('tool' + i + '_complete')) n++;
            }
            return n;
        }

        function safeParseLocalStorage(key) {
            try {
                var s = localStorage.getItem(key);
                if (!s) return null;
                return JSON.parse(s);
            } catch (e) {
                return null;
            }
        }

        function buildTrialPrintPayloadFromLocal() {
            var keys = [
                ['CCI', 'tool1_data'],
                ['CSA', 'tool2_data'],
                ['CAF', 'tool3_data'],
                ['HSI', 'tool4_data'],
                ['FCI', 'tool5_data'],
                ['RRF', 'tool6_data']
            ];
            var obj = {};
            keys.forEach(function (row) {
                var p = safeParseLocalStorage(row[1]);
                if (!p) return;

        function schedulePrintWhenReady(printWindow) {
            var fired = false;
            function go() {
                if (fired) return;
                fired = true;
                try {
                    printWindow.focus();
                    printWindow.print();
                } catch (e) { /* ignore */ }
            }
            var imgs = printWindow.document.images;
            var n = imgs ? imgs.length : 0;
            if (n === 0) {
                setTimeout(go, 450);
                return;
            }
            var done = 0;
            function one() {
                done++;
                if (done >= n) setTimeout(go, 450);
            }
            for (var i = 0; i < n; i++) {
                if (imgs[i].complete) one();
                else {
                    imgs[i].onload = one;
                    imgs[i].onerror = one;
                }
            }
        }

            var now = new Date();
            now.setHours(0, 0, 0, 0);
            var daysLeft = 7 - Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            return Math.max(0, daysLeft);

            var now = new Date();
            now.setHours(0, 0, 0, 0);
            var daysLeft = 7 - Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            var remaining = Math.max(0, daysLeft);

                    <h2 style="font-size: 20px; margin: 32px 0 16px;">Case — Recommended Order</h2>
                    <p style="margin-bottom: 20px; color: #4a5568; line-height: 1.6;">It is recommended that you complete in order, but you may choose any sequence. Reports will unlock for download once all assessments in this section are completed.</p>
                    <p style="margin-bottom: 24px; color: #4a5568; line-height: 1.6; padding: 16px; background: #f4f6f8; border-left: 3px solid #0c1c34;">Consider beginning with a case that has stalled or where clinical direction is unclear. This process also provides a framework for new cases, offering guidance from the outset.</p>
                    <p style="margin-bottom: 12px; font-size: 15px; color: #0c1c34; font-weight: 600;">Start here with your case</p>
                    <div class="collapsible-section">
                      <div class="collapsible-header" onclick="toggleSection('active-tools')">
                        <span style="display: flex; align-items: center; gap: 12px;">
                          <span class="arrow expanded" id="arrow-active">▶</span>
                          <span>Case Tools (<span id="active-progress">${localN}/6</span> completed)</span>
                        </span>
                      </div>
                      <div class="collapsible-content expanded" id="active-tools">
                    <div class="tools-grid">
            `;

            const activeAssessments = (typeof session !== 'undefined' && session && session.active_case && session.active_case.assessments) || {};
            TOOL_ORDER.forEach((toolKey) => {
                const tool = TOOL_INFO[toolKey];
                const status = activeAssessments[toolKey]?.status || 'not_started';
                html += getToolCard(toolKey, tool, status, 'active', {
                    displayName: ACTIVE_NUMBERED_TITLES[toolKey],
                    cardClass: 'tool-card-active',
                    trialExpired: trialExpired,
                    lockedBySequence: false
                });
            });

            html += `</div>
                    <div class="inline-reports-card">
                      <h4 style="font-size: 15px; color: #0c1c34; margin-bottom: 12px;">Case Reports</h4>
                      <p style="font-size: 14px; color: #4a5568; margin-bottom: 10px; line-height: 1.5;">Reports available when all 6 assessments are complete.</p>
                      <p style="font-size: 14px; color: #b8922a; margin-bottom: 8px;">Progress: <span id="active-assessment-report-progress">${localN}</span>/6</p>
                      <p id="report-active-capture" style="font-size: 12px; color: #6a7a8a; margin-bottom: 14px; line-height: 1.4;">${activePrintReady ? '✓ All 6 instruments saved in this browser' : ('Saved locally: ' + localN + '/6. Complete all six to unlock downloads.')}</p>
                      <button type="button" class="btn-report" data-report-btn="active" id="btn-download-active-all" ${(localN === 6 && !trialExpired) ? '' : 'disabled'} onclick="printActiveReports()">Download All Reports</button>
                    </div>
                    ${(localN === 6 && !trialExpired) ? `
                    <div class="purchase-cta-card" style="margin-top:24px;padding:28px 32px;background:linear-gradient(135deg,#0c1c34 0%,#162d4a 100%);border:1px solid #b09837;border-radius:6px;color:#ffffff;text-align:center;">
                      <p style="margin:0 0 10px;font-family:Georgia,'Times New Roman',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#b09837;">Continue Beyond Your Trial</p>
                      <h3 style="margin:0 0 14px;font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:normal;color:#ffffff;line-height:1.35;">Ready to make C.A.S.E. Clarity part of your practice?</h3>
                      <p style="margin:0 0 22px;font-family:Georgia,'Times New Roman',serif;font-size:14px;color:#c4ced8;line-height:1.6;max-width:560px;margin-left:auto;margin-right:auto;">Purchase a single report to keep what you\'ve created, or subscribe to run unlimited assessments on every case you handle.</p>
                      <div style="display:inline-flex;gap:14px;flex-wrap:wrap;justify-content:center;">
                        <a href="https://case-clarity-trial-active-purchase-l9vc0ylpl.vercel.app" target="_blank" rel="noopener" style="display:inline-block;padding:13px 32px;background:#b09837;color:#0c1c34;font-family:Georgia,\'Times New Roman\',serif;font-size:14px;letter-spacing:1px;text-decoration:none;font-weight:600;border-radius:4px;">View Purchase Options</a>
                      </div>
                      <p style="margin:18px 0 0;font-family:Georgia,\'Times New Roman\',serif;font-size:11px;color:#8899aa;letter-spacing:1px;">No commitment required. Review plans at your own pace.</p>
                    </div>
                    ` : ''}
                      </div>
                    </div>
                </div>`;

            // Retrospective Case Section
            

            container.innerHTML = html;

            if (window.CaseClarityTrial && window.CaseClarityTrial.refreshCountdown) {
                window.CaseClarityTrial.refreshCountdown();
            }
            wireBeforeYouBeginCountdown();

            document.getElementById('save-case-info').addEventListener('click', saveCaseInfo);
            wireDashboardCaseAutoSave();
            updateReportUI();
            updateCollapsibleProgress(localN, localN);
            syncCollapsiblePreview('retro-tools');
            syncCollapsiblePreview('active-tools');

            bindTrialReportHandlers();
            updateTrialReportUI();
            var trialUrlParams = new URLSearchParams(window.location.search);
            if (trialUrlParams.get('complete') === 'true') {
                updateTrialReportUI();
                if (allToolsComplete()) {
                    var trialPanel = document.getElementById('trial-complete-report-panel');
                    if (trialPanel) trialPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, document.title, window.location.pathname + window.location.hash);
                }
            }
        }

        function persistDashboardCaseToLocal() {
            try {
                function fieldTrim(id) {
                    var n = document.getElementById(id);
                    return n && n.value != null ? String(n.value).trim() : '';
                }
                function fieldRaw(id) {
                    var n = document.getElementById(id);
                    return n && n.value ? n.value : '';
                }
                var active = {
                    nameCaseId: fieldTrim('active-name-case-id'),
                    dateOfInjury: fieldRaw('active-date-injury'),
                    mechanism: fieldTrim('active-mechanism'),
                    caseType: fieldRaw('active-case-type')
                };
                var retro = {
                    nameCaseId: fieldTrim('retro-name-case-id'),
                    dateOfInjury: fieldRaw('retro-date-injury'),
                    mechanism: fieldTrim('retro-mechanism'),
                    caseType: fieldRaw('retro-case-type')
                };
                localStorage.setItem('dashboard_case_active', JSON.stringify(active));
                localStorage.setItem('dashboard_case_retro', JSON.stringify(retro));
            } catch (e) {}
        }

        function wireDashboardCaseAutoSave() {
            var ids = ['active-name-case-id', 'active-date-injury', 'active-mechanism', 'active-case-type',
                'retro-name-case-id', 'retro-date-injury', 'retro-mechanism', 'retro-case-type'];
            var t;
            function schedule() {
                clearTimeout(t);
                t = setTimeout(persistDashboardCaseToLocal, 400);
            }
            ids.forEach(function (id) {
                var node = document.getElementById(id);
                if (!node) return;
                node.addEventListener('input', schedule);
                node.addEventListener('change', schedule);
            });
        }

        async function saveCaseInfo() {
            // Case info is stored in localStorage only (no Supabase sync needed for case info)
            persistDashboardCaseToLocal();
            alert('Case information saved');
        }

        function getToolCard(toolKey, tool, status, caseType, opts) {
            opts = opts || {};
            const displayName = opts.displayName || tool.name;
            const cardExtra = opts.cardClass ? ' ' + opts.cardClass : '';
            const trialExpired = !!opts.trialExpired;
            const lockedClass = opts.lockedBySequence ? ' tool-card-locked' : '';
            const localDone = isLocalToolComplete(toolKey);
            const sessionDone = status === 'complete';
            const effectiveDone = localDone || sessionDone;

            let statusClass = 'status-not-started';
            let statusText = 'NOT STARTED';
            if (effectiveDone) {
                statusClass = 'status-complete';
                statusText = '✓ COMPLETED';
            }

            let launchDisabled = trialExpired || effectiveDone;
            if (caseType === 'retrospective' && opts.lockedBySequence && !effectiveDone) {
                launchDisabled = true;
            }

            let btnLabel = 'Launch Assessment';
            if (trialExpired) {
                btnLabel = 'Trial expired';
            } else if (effectiveDone) {
                btnLabel = 'Completed';
            } else if (opts.lockedBySequence) {
                btnLabel = 'Complete previous step first';
            }

            return `
                <div class="tool-card${cardExtra}${lockedClass}">
                    <h3 class="tool-name">${displayName}</h3>
                    <p class="tool-desc">${tool.desc}</p>
                    <div class="tool-status ${statusClass}">${statusText}</div>
                    <button class="btn-launch" 
                            onclick="launchTool('${toolKey}', '${caseType}')"
                            ${launchDisabled ? 'disabled' : ''}>
                        ${btnLabel}
                    </button>
                </div>
            `;
        }

        window.launchTool = function(toolKey, caseType) {
            if (localStorage.getItem('trial_start_at') && computeTrialDaysRemaining() <= 0) {
                alert('Trial expired. Your 7-day access from first login on this device has ended.');
                window.location.href = 'pricing.html';
                return;
            }
            const tool = TOOL_INFO[toolKey];
            const toolUrl = tool.url;
            const url = new URL(toolUrl, window.location.href);
            url.searchParams.set('caseType', caseType);
            url.searchParams.set('tool', toolKey);

            window.open(url.toString(), '_blank');
        };

        function showExpiredMessage() {
            document.getElementById('dashboard-content').innerHTML = `
                <div class="expired-message" style="max-width:640px;margin:60px auto;padding:44px 48px;background:#ffffff;border:1px solid #d6d0c4;border-top:4px solid #b09837;text-align:center;">
                    <p style="margin:0 0 12px;font-family:Georgia,'Times New Roman',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#b09837;">Trial Concluded</p>
                    <h2 style="margin:0 0 16px;font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:normal;color:#0c1c34;">Your 7-day trial has ended</h2>
                    <p style="margin:0 0 28px;font-family:Georgia,'Times New Roman',serif;font-size:15px;color:#4a5568;line-height:1.7;">Continue using the C.A.S.E. Clarity System on every case you handle. Review available subscription options to keep your access open.</p>
                    <a href="https://clarity-post-trial-pricing-qnsof4i2l-tracis-projects-26fd65a2.vercel.app" target="_blank" rel="noopener" style="display:inline-block;padding:13px 32px;background:#0c1c34;color:#ffffff;font-family:Georgia,'Times New Roman',serif;font-size:14px;letter-spacing:1px;text-decoration:none;font-weight:600;border-radius:4px;border:1.5px solid #b09837;">View Subscription Plans</a>
                    <div style="margin-top:24px;padding-top:20px;border-top:1px solid #e8e3d8;">
                      <button onclick="handleLogout()" style="background:transparent;border:1px solid #c4ced8;color:#4a5568;padding:9px 22px;font-family:Georgia,'Times New Roman',serif;font-size:13px;cursor:pointer;border-radius:3px;">Return to Login</button>
                    </div>
                </div>
            `;
        }

        window.handleLogout = function() {
            localStorage.clear();
            window.location.href = 'login.html';
        };

        // Initial render — was missing, caused blank dashboard
        if (typeof computeTrialDaysRemaining === 'function' && computeTrialDaysRemaining() <= 0 && localStorage.getItem('trial_start_at')) {
            showExpiredMessage();
        } else {
            renderDashboard();
        }

        // Refresh progress every 30 seconds
        setInterval(function() {
            updateTrialReportUI();
            updateReportUI();
        }, 30000);
        })();
    </script>
</body>
</html>
