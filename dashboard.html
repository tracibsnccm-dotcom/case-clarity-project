<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Clarity Project - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        .collapsible-header {
            background: #f1f0eb;
            padding: 16px 24px;
            margin: 16px 0 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #d6d0c4;
            border-left: 3px solid #b8922a;
        }
        .collapsible-header:hover {
            background: #e8e3d8;
        }
        .collapsible-content {
            display: none;
            padding: 16px 0;
        }
        .collapsible-content.expanded {
            display: block;
        }
        .arrow {
            font-size: 18px;
            transition: transform 0.2s;
        }
        .arrow.expanded {
            transform: rotate(90deg);
        }
        .tool-preview {
            font-family: monospace;
            letter-spacing: 1px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f6f3ed;
            color: #0e1c2e;
        }

            background: #0c1c34;

            align-items: center;
            justify-content: space-between;

        }

        .app-header-right { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #6a8aaa; }

        }

        .container {

    <script>
        (function () {
        // Protect dashboard — redirect to login if not authenticated
        const assessmentId = localStorage.getItem('assessment_id');
        const sessionId = localStorage.getItem('session_id');

        if (!assessmentId || !sessionId) {
            window.location.href = 'login.html';
            return;
        }

        // Supabase setup
        const SUPABASE_URL = 'https://zmjxyspizdqhrtdcgkwk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inptanh5c3BpemRxaHJ0ZGNna3drIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4MjQ1NDcsImV4cCI6MjA4NTE4NDU0N30.szuVr87xdq1aqYpaM6p390f48ozj4CENU4ksg8vumhM';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== REPORT STORAGE (No Database Required) =====
        try {
            window.reportData = JSON.parse(sessionStorage.getItem('reportData') || 'null') || { active: {}, retro: {} };
        } catch (e) {
            window.reportData = { active: {}, retro: {} };
        }
        if (!window.reportData.active) window.reportData.active = {};
        if (!window.reportData.retro) window.reportData.retro = {};

        function allToolsComplete() {
            for (var i = 1; i <= 6; i++) {
                if (!localStorage.getItem('tool' + i + '_complete')) {
                    return false;
                }
            }
            return true;
        }
        window.allToolsComplete = allToolsComplete;

        function countLocalToolsComplete() {
            var n = 0;
            for (var i = 1; i <= 6; i++) {
                if (localStorage.getItem('tool' + i + '_complete')) n++;
            }
            return n;
        }

        function safeParseLocalStorage(key) {
            try {
                var s = localStorage.getItem(key);
                if (!s) return null;
                return JSON.parse(s);
            } catch (e) {
                return null;
            }
        }

        function buildTrialPrintPayloadFromLocal() {
            var keys = [
                ['CCI', 'tool1_data'],
                ['CSA', 'tool2_data'],
                ['CAF', 'tool3_data'],
                ['HSI', 'tool4_data'],
                ['FCI', 'tool5_data'],
                ['RRF', 'tool6_data']
            ];
            var obj = {};
            keys.forEach(function (row) {
                var p = safeParseLocalStorage(row[1]);
                if (!p) return;
                var inner = p.data !== undefined ? p.data : p;
                obj[row[0]] = {
                    data: inner,
                    completedAt: p.timestamp || p.generatedAt || p.completedAt || new Date().toISOString()
                };
            });
            return obj;
        }

        function escPrintHtml(s) {
            if (s == null || s === '') return '—';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escPrintAttr(s) {
            if (s == null || s === '') return '';
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        }

        function getPrintDocumentBaseHref() {
            try {
                return new URL('.', window.location.href).href;
            } catch (e) {
                return '';
            }
        }

        var _toolPrintStylesPromise = null;
        var TOOL_PRINT_SOURCES = ['tool1-cci.html', 'tool2-csa.html', 'tool3-caf.html', 'tool4-hsi.html', 'tool5-fci.html', 'tool6-rrf.html'];

        function extractInlineStyleBlocks(htmlText) {
            if (!htmlText) return '';
            var out = '';
            var re = /<style[^>]*>([\s\S]*?)<\/style>/gi;
            var m;
            while ((m = re.exec(htmlText)) !== null) {
                out += '\n' + (m[1] || '');
            }
            return out;
        }

        async function loadToolPrintStyles() {
            if (_toolPrintStylesPromise) return _toolPrintStylesPromise;
            _toolPrintStylesPromise = Promise.all(TOOL_PRINT_SOURCES.map(async function (src) {
                try {
                    var res = await fetch(src, { cache: 'no-store' });
                    if (!res.ok) return '';
                    var text = await res.text();
                    return extractInlineStyleBlocks(text);
                } catch (e) {
                    return '';
                }
            })).then(function (chunks) {
                return chunks.filter(Boolean).join('\n');
            });
            return _toolPrintStylesPromise;
        }

        function schedulePrintWhenReady(printWindow) {
            var fired = false;
            function go() {
                if (fired) return;
                fired = true;
                try {
                    printWindow.focus();
                    printWindow.print();
                } catch (e) { /* ignore */ }
            }
            var imgs = printWindow.document.images;
            var n = imgs ? imgs.length : 0;
            if (n === 0) {
                setTimeout(go, 450);
                return;
            }
            var done = 0;
            function one() {
                done++;
                if (done >= n) setTimeout(go, 450);
            }
            for (var i = 0; i < n; i++) {
                if (imgs[i].complete) one();
                else {
                    imgs[i].onload = one;
                    imgs[i].onerror = one;
                }
            }
        }

                html += content;
                html += '</div>';
                globalPageNumber += estimatedPages;

            html += '<div style="text-align:center; font-size:10px; color:#999; margin-top:30px;">Page ' + Math.max(0, globalPageNumber - 1) + ' total</div>';

        function computeTrialDaysRemaining() {
            var raw = localStorage.getItem('trial_start_at');
            if (!raw) return 7;
            var startDate = new Date(raw);
            startDate.setHours(0, 0, 0, 0);
            var now = new Date();
            now.setHours(0, 0, 0, 0);
            var daysLeft = 7 - Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            return Math.max(0, daysLeft);
        }

        function updateRealCountdown() {
            var el = document.getElementById('countdown-timer');
            if (!el) return;
            var start = localStorage.getItem('trial_start_at');
            if (!start) {
                el.innerHTML = '7 days';
                return;
            }
            var startDate = new Date(start);
            startDate.setHours(0, 0, 0, 0);
            var now = new Date();
            now.setHours(0, 0, 0, 0);
            var daysLeft = 7 - Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            var remaining = Math.max(0, daysLeft);
            el.innerHTML = remaining + (remaining === 1 ? ' day' : ' days');
        }

                var active = {
                    nameCaseId: fieldTrim('active-name-case-id'),
                    dateOfInjury: fieldRaw('active-date-injury'),
                    mechanism: fieldTrim('active-mechanism'),
                    caseType: fieldRaw('active-case-type')

                    nameCaseId: fieldTrim('retro-name-case-id'),
                    dateOfInjury: fieldRaw('retro-date-injury'),
                    mechanism: fieldTrim('retro-mechanism'),
                    caseType: fieldRaw('retro-case-type')

                localStorage.setItem('dashboard_case_active', JSON.stringify(active));

            ids.forEach(function (id) {
                var node = document.getElementById(id);
                if (!node) return;
                node.addEventListener('input', schedule);
                node.addEventListener('change', schedule);
            });
        }

        async function saveCaseInfo() {
            persistDashboardCaseToLocal();
            const activeName = document.getElementById('active-name-case-id').value.trim();
            const retroName = document.getElementById('retro-name-case-id').value.trim();

            const { data: session, error } = await supabaseClient
                .from('assessment_sessions')
                .select('active_case, retrospective_case')
                .eq('id', sessionId)
                .single();

            if (error || !session) {
                alert('Could not save. Please try again.');
                return;
            }

            const activeCase = session.active_case || { assessments: {} };
            const retroCase = session.retrospective_case || { assessments: {} };
            if (!activeCase.assessments) activeCase.assessments = {};
            if (!retroCase.assessments) retroCase.assessments = {};

            activeCase.name_case_id = activeName;
            activeCase.reference = activeName;
            activeCase.date_of_injury = document.getElementById('active-date-injury').value || '';
            activeCase.mechanism = document.getElementById('active-mechanism').value.trim();
            activeCase.case_type = document.getElementById('active-case-type').value || '';

            retroCase.name_case_id = retroName;
            retroCase.reference = retroName;
            retroCase.date_of_injury = document.getElementById('retro-date-injury').value || '';
            retroCase.mechanism = document.getElementById('retro-mechanism').value.trim();
            retroCase.case_type = document.getElementById('retro-case-type').value || '';

            await supabaseClient
                .from('assessment_sessions')
                .update({ active_case: activeCase, retrospective_case: retroCase })
                .eq('id', sessionId);

            alert('Case information saved');
        }

        function getToolCard(toolKey, tool, status, caseType, opts) {
            opts = opts || {};
            const displayName = opts.displayName || tool.name;
            const cardExtra = opts.cardClass ? ' ' + opts.cardClass : '';
            const trialExpired = !!opts.trialExpired;
            const lockedClass = opts.lockedBySequence ? ' tool-card-locked' : '';
            const localDone = isLocalToolComplete(toolKey);
            const sessionDone = status === 'complete';
            const effectiveDone = localDone || sessionDone;

            let statusClass = 'status-not-started';
            let statusText = 'NOT STARTED';
            if (effectiveDone) {
                statusClass = 'status-complete';
                statusText = '✓ COMPLETED';
            }

            let launchDisabled = trialExpired || effectiveDone;
            if (caseType === 'retrospective' && opts.lockedBySequence && !effectiveDone) {
                launchDisabled = true;
            }

            let btnLabel = 'Launch Assessment';
            if (trialExpired) {
                btnLabel = 'Trial expired';
            } else if (effectiveDone) {
                btnLabel = 'Completed';
            } else if (opts.lockedBySequence) {
                btnLabel = caseType === 'active' ? 'Complete previous step first' : 'Complete Active Case first';
            }

            return `
                <div class="tool-card${cardExtra}${lockedClass}">
                    <h3 class="tool-name">${displayName}</h3>
                    <p class="tool-desc">${tool.desc}</p>
                    <div class="tool-status ${statusClass}">${statusText}</div>
                    <button class="btn-launch" 
                            onclick="launchTool('${toolKey}', '${caseType}')"
                            ${launchDisabled ? 'disabled' : ''}>
                        ${btnLabel}
                    </button>
                </div>
            `;
        }

        window.launchTool = function(toolKey, caseType) {
            if (localStorage.getItem('trial_start_at') && computeTrialDaysRemaining() <= 0) {
                alert('Trial expired. Your 7-day access from first login on this device has ended.');
                return;
            }
            const sessionId = localStorage.getItem('session_id');
            const assessmentId = localStorage.getItem('assessment_id');
            const tool = TOOL_INFO[toolKey];
            const toolUrl = tool.url;
            const url = new URL(toolUrl, window.location.href);
            url.searchParams.set('session', sessionId);
            url.searchParams.set('assessmentId', assessmentId);
            url.searchParams.set('caseType', caseType);
            url.searchParams.set('tool', toolKey);

            window.open(url.toString(), '_blank');
        };

        function showExpiredMessage() {
            document.getElementById('dashboard-content').innerHTML = `
                <div class="expired-message">
                    <h2>Access Expired</h2>
                    <p>Your 7-day assessment window has expired.</p>
                    <p>Please contact support if you need assistance.</p>
                    <button onclick="handleLogout()" class="btn-primary" style="margin-top: 20px;">Return to Login</button>
                </div>
            `;
        }

        window.handleLogout = function() {
            localStorage.clear();
            window.location.href = 'login.html';
        };

        // Refresh progress every 30 seconds
        setInterval(loadDashboard, 30000);
        })();
    </script>
</body>
</html>
